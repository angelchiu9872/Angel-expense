<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精緻記帳小幫手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- PropTypes (Recharts UMD 必備) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDF8F9; margin: 0; padding: 0; overflow: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        /* 隱藏滾動條但保持功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            PieChart, Pie, BarChart, Bar, XAxis, YAxis, Tooltip, 
            ResponsiveContainer, Cell, CartesianGrid 
        } = window.Recharts;

        // 改用內聯 SVG 圖標，徹底解決 Lucide DOM 衝突問題
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'pen-square': <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>,
                'layout-dashboard': <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>,
                'wallet': <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>,
                'calculator': <rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>,
                'trending-up': <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>,
                'pie-chart': <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10Z"/>,
                'bar-chart-3': <path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/>,
                'refresh-cw': <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>,
                'arrow-up-circle': <circle cx="12" cy="12" r="10"/><path d="m16 12-4-4-4 4"/><path d="M12 16V8"/>,
                'arrow-down-circle': <circle cx="12" cy="12" r="10"/><path d="m8 12 4 4 4-4"/><path d="M12 8v8"/>,
                'list-checks': <path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>
            };
            return (
                <svg 
                    width={size} height={size} 
                    viewBox="0 0 24 24" fill="none" 
                    stroke="currentColor" strokeWidth="2" 
                    strokeLinecap="round" strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const theme = {
            chartColors: ['#E8D3D1', '#D8C6BC', '#C4A49D', '#B5998E', '#9B7E76', '#8E736B', '#D98A8A', '#A3B18A', '#7F5539', '#B7B7A4', '#6B705C', '#CB997E']
        };

        const CATEGORY_ORDER = ['食物', '衣物', '娛樂', '交通', '教育', '孝親', '股票', '儲蓄', '保養', '醫療', '國家', '收入', '其他'];

        const parseCSV = (csvText) => {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const dateIdx = headers.findIndex(h => h.includes('時間戳記'));
            const amountIdx = headers.findIndex(h => h.includes('費用'));
            const categoryIdx = headers.findIndex(h => h.includes('類別'));
            
            return lines.slice(1).map((line, i) => {
                const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/^"|"$/g, '').trim());
                if (row.length <= 2) return null;
                const amount = parseFloat((row[amountIdx] || "0").replace(/[^0-9.-]+/g, '')) || 0;
                const dateObj = new Date(row[dateIdx]);
                if (isNaN(dateObj.getTime())) return null;
                return {
                    id: i,
                    month: `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`,
                    category: row[categoryIdx] || '其他',
                    amount: Math.abs(amount)
                };
            }).filter(Boolean);
        };

        // --- 組件設計 ---
        const PageHeader = ({ title, subtitle, children }) => (
            <header className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
                <div>
                    <h2 className="text-3xl font-black mb-1 text-[#4A3F39] tracking-tight">{title}</h2>
                    <p className="text-gray-400 font-medium text-sm">{subtitle}</p>
                </div>
                <div className="flex flex-wrap gap-2">{children}</div>
            </header>
        );

        const NavButton = ({ icon, label, isActive, onClick }) => (
            <button onClick={onClick} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold w-full ${isActive ? 'bg-white shadow-sm text-[#4A3F39]' : 'text-[#4A3F39]/60 hover:bg-white/40'}`}>
                <Icon name={icon} size={20} /> <span>{label}</span>
            </button>
        );

        const InputPage = () => (
            <div className="animate-in h-full flex flex-col">
                <PageHeader title="新增記錄" subtitle="即時同步至雲端試算表資料庫" />
                <div className="flex-1 min-h-[500px] bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdbf0oKCC-6izeCIKaGhKjOc_vGHe-EnCLWr4iiCJbeTmaHfA/viewform?embedded=true" className="w-full h-full border-0">載入中…</iframe>
                </div>
            </div>
        );

        const OverviewPage = ({ expenses }) => {
            const [chartMode, setChartMode] = useState('pie');
            const expenseOnly = useMemo(() => expenses.filter(exp => exp.category !== '收入'), [expenses]);
            const options = useMemo(() => Array.from(new Set(expenseOnly.map(e => e.month))).sort().reverse(), [expenseOnly]);
            const [selectedPeriod, setSelectedPeriod] = useState(options[0] || '');

            const chartData = useMemo(() => {
                const filtered = expenseOnly.filter(exp => exp.month === selectedPeriod);
                const aggregated = filtered.reduce((acc, curr) => {
                    acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
                    return acc;
                }, {});
                return CATEGORY_ORDER.filter(cat => cat !== '收入' && aggregated[cat]).map(name => ({ name, value: aggregated[name] }));
            }, [expenseOnly, selectedPeriod]);

            const total = chartData.reduce((s, i) => s + i.value, 0);

            return (
                <div className="animate-in">
                    <PageHeader title="消費總覽" subtitle="精確分析您的月度支出比例">
                        <div className="flex bg-white p-1 rounded-lg border border-gray-100">
                            <button onClick={() => setChartMode('pie')} className={`p-1.5 rounded transition-colors ${chartMode === 'pie' ? 'bg-[#E8D3D1]' : ''}`}><Icon name="pie-chart" size={16}/></button>
                            <button onClick={() => setChartMode('bar')} className={`p-1.5 rounded transition-colors ${chartMode === 'bar' ? 'bg-[#E8D3D1]' : ''}`}><Icon name="bar-chart-3" size={16}/></button>
                        </div>
                        <select value={selectedPeriod} onChange={e => setSelectedPeriod(e.target.value)} className="bg-white px-3 py-1.5 rounded-lg border text-sm font-bold outline-none">
                            {options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </PageHeader>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-white p-8 rounded-3xl border border-gray-100 flex flex-col items-center justify-center shadow-sm">
                            <div className="w-16 h-16 bg-[#FDF0F0] rounded-2xl flex items-center justify-center text-[#D98A8A] mb-4">
                                <Icon name="trending-up" size={32} />
                            </div>
                            <span className="text-xs text-gray-400 font-bold tracking-widest uppercase">總支出</span>
                            <span className="text-4xl font-black text-[#4A3F39]">${total.toLocaleString()}</span>
                        </div>
                        <div className="lg:col-span-2 bg-white p-6 rounded-3xl border border-gray-100 h-[380px] shadow-sm">
                            {chartData.length > 0 ? (
                                <ResponsiveContainer width="100%" height="100%">
                                    {chartMode === 'pie' ? (
                                        <PieChart>
                                            <Pie data={chartData} cx="50%" cy="50%" innerRadius={70} outerRadius={100} paddingAngle={4} dataKey="value" label={({name, percent}) => `${name} ${(percent * 100).toFixed(0)}%`}>
                                                {chartData.map((e, i) => <Cell key={i} fill={theme.chartColors[CATEGORY_ORDER.indexOf(e.name) % theme.chartColors.length]} />)}
                                            </Pie>
                                            <Tooltip />
                                        </PieChart>
                                    ) : (
                                        <BarChart data={chartData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F5F5F5" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                            <YAxis axisLine={false} tickLine={false} />
                                            <Tooltip cursor={{fill: '#FDF8F9'}} />
                                            <Bar dataKey="value" radius={[6, 6, 0, 0]} barSize={35}>
                                                {chartData.map((e, i) => <Cell key={i} fill={theme.chartColors[CATEGORY_ORDER.indexOf(e.name) % theme.chartColors.length]} />)}
                                            </Bar>
                                        </BarChart>
                                    )}
                                </ResponsiveContainer>
                            ) : <div className="h-full flex items-center justify-center text-gray-300 italic">暫無數據</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const BudgetPage = ({ expenses }) => {
            const monthOptions = useMemo(() => Array.from(new Set(expenses.map(e => e.month))).sort().reverse(), [expenses]);
            const [selectedMonth, setSelectedMonth] = useState(monthOptions[0] || '');
            const [budgetGoals, setBudgetGoals] = useState(() => JSON.parse(localStorage.getItem('budget_goals') || '{}'));

            const stats = useMemo(() => {
                const periodData = expenses.filter(e => e.month === selectedMonth);
                const income = periodData.filter(e => e.category === '收入').reduce((s, e) => s + e.amount, 0);
                const expMap = periodData.filter(e => e.category !== '收入').reduce((acc, curr) => {
                    acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
                    return acc;
                }, {});
                return { income, expMap };
            }, [expenses, selectedMonth]);

            const updateGoal = (cat, val) => {
                const newGoals = { ...budgetGoals, [cat]: val };
                setBudgetGoals(newGoals);
                localStorage.setItem('budget_goals', JSON.stringify(newGoals));
            };

            return (
                <div className="animate-in">
                    <PageHeader title="預算進度" subtitle="設定目標並追蹤各項開支達成率">
                        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="bg-white px-3 py-1.5 rounded-lg border text-sm font-bold outline-none">
                            {monthOptions.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                    </PageHeader>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                            <h3 className="font-bold text-[#4A3F39] mb-6">類別預算管理</h3>
                            <div className="space-y-5">
                                {CATEGORY_ORDER.filter(c => c !== '收入').map(cat => {
                                    const amount = stats.expMap[cat] || 0;
                                    const goal = budgetGoals[cat] || 0;
                                    const percent = goal > 0 ? (amount / goal) * 100 : 0;
                                    return (
                                        <div key={cat}>
                                            <div className="flex justify-between mb-1.5 items-center">
                                                <span className="text-sm font-bold text-gray-500">{cat}</span>
                                                <div className="text-xs font-bold text-[#4A3F39]">
                                                    ${amount.toLocaleString()} <span className="text-gray-300 mx-1">/</span>
                                                    <input type="number" placeholder="目標" value={goal || ''} onChange={e => updateGoal(cat, parseFloat(e.target.value) || 0)} className="w-16 border-b border-gray-100 text-right outline-none focus:border-[#B5998E] bg-transparent"/>
                                                </div>
                                            </div>
                                            <div className="h-1.5 bg-gray-50 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-700 ${percent > 100 ? 'bg-red-300' : 'bg-[#D8C6BC]'}`} style={{ width: `${Math.min(percent || (amount > 0 ? 5 : 0), 100)}%` }} />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div className="bg-[#A3B18A]/10 p-8 rounded-3xl border border-[#A3B18A]/20 flex justify-between items-center">
                                <div><p className="text-[10px] font-bold text-[#A3B18A] tracking-wider uppercase mb-1">月總收入</p><p className="text-3xl font-black text-[#588157]">${stats.income.toLocaleString()}</p></div>
                                <Icon name="arrow-up-circle" size={40} className="text-[#A3B18A]" />
                            </div>
                            <div className="bg-[#D98A8A]/10 p-8 rounded-3xl border border-[#D98A8A]/20 flex justify-between items-center">
                                <div><p className="text-[10px] font-bold text-[#D98A8A] tracking-wider uppercase mb-1">月總支出</p><p className="text-3xl font-black text-[#A44A4A]">${Object.values(stats.expMap).reduce((a,b)=>a+b,0).toLocaleString()}</p></div>
                                <Icon name="arrow-down-circle" size={40} className="text-[#D98A8A]" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SettlePage = ({ expenses }) => {
            const monthOptions = useMemo(() => Array.from(new Set(expenses.map(e => e.month))).sort().reverse(), [expenses]);
            const [selectedMonth, setSelectedMonth] = useState(monthOptions[0] || '');
            const [excluded, setExcluded] = useState(['儲蓄', '股票']);

            const stats = useMemo(() => {
                const periodData = expenses.filter(e => e.month === selectedMonth);
                const income = periodData.filter(e => e.category === '收入').reduce((s, e) => s + e.amount, 0);
                const expMap = periodData.filter(e => e.category !== '收入').reduce((acc, curr) => {
                    acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
                    return acc;
                }, {});
                return { income, expMap };
            }, [expenses, selectedMonth]);

            const netExpense = Object.entries(stats.expMap).filter(([c]) => !excluded.includes(c)).reduce((s,[_,v])=>s+v, 0);

            return (
                <div className="animate-in">
                    <PageHeader title="財務結算" subtitle="手動過濾特定類別以計算生活淨存額">
                        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} className="bg-white px-3 py-1.5 rounded-lg border text-sm font-bold outline-none">
                            {monthOptions.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                    </PageHeader>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="list-checks" size={18} /> 支出過濾</h3>
                            <div className="grid grid-cols-2 gap-2">
                                {CATEGORY_ORDER.filter(c=>c!=='收入').map(cat => (
                                    <div key={cat} onClick={() => setExcluded(p => p.includes(cat) ? p.filter(x=>x!==cat) : [...p, cat])} className={`p-3 rounded-xl cursor-pointer border text-center transition-all ${excluded.includes(cat) ? 'opacity-30 bg-gray-50 border-transparent' : 'bg-white border-gray-100 shadow-sm'}`}>
                                        <p className="text-xs text-gray-400 mb-1">{cat}</p>
                                        <p className="font-black text-sm">${(stats.expMap[cat] || 0).toLocaleString()}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 text-center flex flex-col justify-center">
                            <p className="text-xs text-gray-400 font-bold mb-1">計算收入 ({stats.income.toLocaleString()}) - 生活支出 ({netExpense.toLocaleString()})</p>
                            <div className="bg-[#E8D3D1] p-10 rounded-3xl shadow-inner my-4">
                                <p className="text-xs font-black text-[#5A4A42] uppercase tracking-tighter mb-2">最終結餘</p>
                                <h4 className="text-5xl font-black text-[#4A3F39]">${(stats.income - netExpense).toLocaleString()}</h4>
                            </div>
                            <p className="text-[10px] text-gray-300 italic">※ 已扣除排除項目，呈現真實生活可動用資金</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('input');
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchExpenses = async () => {
                setLoading(true);
                try {
                    const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRfdXmG5deMAoGDbfQbftAZiXCIHhDlRbqlkqBcRAGZ8lVSP6YD5UuWKN5sCppAQqE16wEy-AaCvQmA/pub?gid=107014608&single=true&output=csv&cb=${Date.now()}`;
                    const res = await fetch(url);
                    const csv = await res.text();
                    setExpenses(parseCSV(csv));
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchExpenses(); }, []);

            return (
                <div className="h-screen flex flex-col md:flex-row overflow-hidden">
                    <nav className="md:w-56 bg-[#E8D3D1] flex-shrink-0 flex flex-col z-20 shadow-lg">
                        <div className="p-6 pt-8"><h1 className="text-xl font-black text-[#4A3F39] tracking-tighter">精緻記帳小幫手</h1></div>
                        <div className="flex md:flex-col flex-1 px-3 gap-1 overflow-x-auto hide-scrollbar">
                            <NavButton icon="pen-square" label="記帳表單" isActive={activeTab === 'input'} onClick={() => setActiveTab('input')} />
                            <NavButton icon="layout-dashboard" label="消費總覽" isActive={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
                            <NavButton icon="wallet" label="預算管理" isActive={activeTab === 'budget'} onClick={() => setActiveTab('budget')} />
                            <NavButton icon="calculator" label="財務結算" isActive={activeTab === 'settle'} onClick={() => setActiveTab('settle')} />
                        </div>
                        <div className="p-4 hidden md:block">
                            <button onClick={fetchExpenses} className="w-full py-2.5 rounded-xl bg-white/30 text-[10px] font-bold flex items-center justify-center gap-2 hover:bg-white/50 transition-all uppercase tracking-widest">
                                <Icon name="refresh-cw" size={12} className={loading ? 'animate-spin' : ''} /> 同步資料庫
                            </button>
                        </div>
                    </nav>
                    <main className="flex-1 p-6 md:p-8 overflow-y-auto bg-[#FDF8F9]">
                        {loading && activeTab !== 'input' ? (
                            <div className="h-full flex flex-col items-center justify-center gap-3 text-gray-300 font-bold">
                                <Icon name="refresh-cw" size={40} className="animate-spin" />
                                <p className="text-sm">資料同步中...</p>
                            </div>
                        ) : (
                            <div className="max-w-5xl mx-auto h-full">
                                {activeTab === 'input' && <InputPage />}
                                {activeTab === 'overview' && <OverviewPage expenses={expenses} />}
                                {activeTab === 'budget' && <BudgetPage expenses={expenses} />}
                                {activeTab === 'settle' && <SettlePage expenses={expenses} />}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
