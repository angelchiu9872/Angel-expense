<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳本 - Web App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #FCF5F7; }
        /* 隱藏捲軸但保留功能 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 從全域變數中取出需要的 React 與 Recharts 組件
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // 資料來源設定
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfdXmG5deMAoGDbfQbftAZiXCIHhDlRbqlkqBcRAGZ8lVSP6YD5UuWKN5sCppAQqE16wEy-AaCvQmA/pub?gid=107014608&single=true&output=csv';

        // 分類定義與色彩
        const CATEGORIES = ['食物', '衣物', '娛樂', '交通', '教育', '孝親', '股票', '儲蓄', '保養', '醫療', '國家', '收入', '其他'];
        const EXPENSE_CATEGORIES = ['食物', '衣物', '娛樂', '交通', '教育', '孝親', '保養', '醫療', '國家', '其他'];
        const INCOME_CATEGORIES = ['收入'];
        const INVEST_CATEGORIES = ['股票', '儲蓄'];
        const CATEGORY_COLORS = {
            '食物': '#D69E9E', '衣物': '#B09A8F', '娛樂': '#9E8479', '交通': '#8C766D',
            '教育': '#C48D88', '孝親': '#B88F8D', '股票': '#708A7B', '儲蓄': '#8EA397',
            '保養': '#C4A4A3', '醫療': '#A68E94', '國家': '#917F79', '收入': '#6A917B', '其他': '#A0A0A0'
        };

        // 圖示組件 (手寫簡單版以確保不依賴外部 React 套件)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('form');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
            const [chartType, setChartType] = useState('pie');

            const parseCSVLine = (text) => {
                const re = /(?!\s*$)\s*(?:'([^']*)'|"([^"]*)"|([^,]*))\s*(?:,|$)/g;
                const res = [];
                let match;
                while ((match = re.exec(text)) !== null) {
                    res.push(match[1] || match[2] || match[3] || "");
                }
                return res;
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
                    const text = await res.text();
                    const lines = text.split(/\r?\n/);
                    const result = [];
                    for (let i = 1; i < lines.length; i++) {
                        const parts = parseCSVLine(lines[i]);
                        if (parts.length >= 3) {
                            const amount = parseFloat(parts[1].replace(/,/g, ''));
                            const dateMatch = parts[0].split(' ')[0].match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
                            if (dateMatch && !isNaN(amount)) {
                                result.push({ amount, category: parts[2].trim(), year: parseInt(dateMatch[1]), month: parseInt(dateMatch[2]) });
                            }
                        }
                    }
                    setData(result);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            useEffect(() => { loadData(); }, []);

            const stats = useMemo(() => {
                const totals = { income: 0, expense: 0, invest: 0, byCategory: {} };
                data.filter(d => d.year === selectedYear && (selectedMonth === 0 || d.month === selectedMonth)).forEach(d => {
                    if (INCOME_CATEGORIES.includes(d.category)) totals.income += d.amount;
                    else if (INVEST_CATEGORIES.includes(d.category)) totals.invest += d.amount;
                    else if (EXPENSE_CATEGORIES.includes(d.category)) totals.expense += d.amount;
                    totals.byCategory[d.category] = (totals.byCategory[d.category] || 0) + d.amount;
                });
                return totals;
            }, [data, selectedYear, selectedMonth]);

            const chartData = Object.entries(stats.byCategory)
                .filter(([name]) => EXPENSE_CATEGORIES.includes(name))
                .map(([name, value]) => ({ name, value }))
                .sort((a, b) => b.value - a.value);

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-[#FCF5F7] shadow-2xl overflow-hidden font-sans">
                    <header className="bg-white py-4 px-6 border-b border-[#E8D3D1] flex justify-between items-center z-20">
                        <h1 className="text-xl font-black text-[#B09A8F]">個人記帳本</h1>
                        <button onClick={loadData} className={`p-2 text-[#B09A8F] ${loading ? 'animate-spin' : ''}`}>
                            <Icon name="refresh-cw" />
                        </button>
                    </header>

                    <div className="flex-1 relative overflow-y-auto">
                        {activeTab === 'form' ? (
                            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdbf0oKCC-6izeCIKaGhKjOc_vGHe-EnCLWr4iiCJbeTmaHfA/viewform?embedded=true" className="w-full h-[1000px] border-0">載入中…</iframe>
                        ) : (
                            <div className="p-5 pb-24">
                                <div className="flex gap-2 mb-6">
                                    <select value={selectedYear} onChange={e => setSelectedYear(Number(e.target.value))} className="flex-1 p-2 border-2 border-[#E8D3D1] rounded-xl font-bold">
                                        {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y} 年</option>)}
                                    </select>
                                    <select value={selectedMonth} onChange={e => setSelectedMonth(Number(e.target.value))} className="flex-1 p-2 border-2 border-[#E8D3D1] rounded-xl font-bold">
                                        <option value={0}>全年</option>
                                        {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1} 月</option>)}
                                    </select>
                                </div>

                                <div className="grid grid-cols-3 gap-2 mb-6">
                                    <div className="bg-white p-3 rounded-xl shadow-sm border-b-4 border-[#6A917B] text-center">
                                        <div className="text-[10px] text-gray-500">收入</div>
                                        <div className="text-sm font-bold">${stats.income.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl shadow-sm border-b-4 border-[#D69E9E] text-center">
                                        <div className="text-[10px] text-gray-500">支出</div>
                                        <div className="text-sm font-bold">${stats.expense.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl shadow-sm border-b-4 border-[#708A7B] text-center">
                                        <div className="text-[10px] text-gray-500">投資</div>
                                        <div className="text-sm font-bold">${stats.invest.toLocaleString()}</div>
                                    </div>
                                </div>

                                <div className="bg-white p-4 rounded-3xl shadow-md border border-[#E8D3D1] h-80">
                                    <div className="flex justify-between mb-4">
                                        <h3 className="text-xs font-bold text-gray-400">支出分析</h3>
                                        <div className="flex bg-gray-100 rounded-lg p-1 text-[10px]">
                                            <button onClick={()=>setChartType('pie')} className={`px-2 py-1 ${chartType==='pie'?'bg-white shadow-sm':''}`}>圓餅</button>
                                            <button onClick={()=>setChartType('bar')} className={`px-2 py-1 ${chartType==='bar'?'bg-white shadow-sm':''}`}>長條</button>
                                        </div>
                                    </div>
                                    <ResponsiveContainer width="100%" height="80%">
                                        {chartType === 'pie' ? (
                                            <PieChart>
                                                <Pie data={chartData} innerRadius={50} outerRadius={80} dataKey="value">
                                                    {chartData.map((entry, index) => <Cell key={index} fill={CATEGORY_COLORS[entry.name]} />)}
                                                </Pie>
                                                <Tooltip />
                                                <Legend />
                                            </PieChart>
                                        ) : (
                                            <BarChart data={chartData}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" tick={{fontSize: 10}} />
                                                <YAxis hide />
                                                <Tooltip />
                                                <Bar dataKey="value">
                                                    {chartData.map((entry, index) => <Cell key={index} fill={CATEGORY_COLORS[entry.name]} />)}
                                                </Bar>
                                            </BarChart>
                                        )}
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-0 max-w-md w-full bg-white border-t border-[#E8D3D1] flex justify-around py-3 z-30">
                        <button onClick={() => setActiveTab('form')} className={`flex flex-col items-center ${activeTab === 'form' ? 'text-[#D69E9E]' : 'text-gray-400'}`}>
                            <Icon name="file-edit" />
                            <span className="text-[10px] mt-1 font-bold">填寫</span>
                        </button>
                        <button onClick={() => setActiveTab('overview')} className={`flex flex-col items-center ${activeTab === 'overview' ? 'text-[#D69E9E]' : 'text-gray-400'}`}>
                            <Icon name="pie-chart" />
                            <span className="text-[10px] mt-1 font-bold">報表</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
